version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: kitchino-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kitchino
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: kitchino-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  postgres_data: